<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  overflow: hidden;
  color: white;
}

/* BACKGROUND ANIMASI */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, #ff9acb, transparent),
              radial-gradient(circle at 70% 70%, #a64dff, transparent),
              radial-gradient(circle at 50% 50%, #ff4da6, transparent);
  animation: moveBg 15s infinite alternate;
  z-index: -1;
}

@keyframes moveBg {
  0% { transform: translate(0,0); }
  100% { transform: translate(-20%, -20%); }
}

/* SLIDES */
#slides {
  display: flex;
  height: 100vh;
  transition: transform 0.8s cubic-bezier(0.77, 0, 0.175, 1);
}

.slide {
  min-width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  backdrop-filter: blur(20px);
  text-align: center;
}

/* TEXT */
h1 {
  font-size: 30px;
  font-weight: 600;
  margin: 10px;
}

p {
  font-size: 16px;
  opacity: 0.8;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  background: linear-gradient(45deg, #ff9acb, #ff4da6);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.1);
}

/* NAMA ANIMASI */
.nama {
  font-size: 45px;
  color: #fff;
  text-shadow: 0 0 20px pink;
  opacity: 0;
  transform: translateY(30px);
  animation: muncul 1.5s forwards;
}

@keyframes muncul {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* GIF */
img {
  width: 220px;
  border-radius: 20px;
  margin-top: 20px;
}

/* HEART */
.heart {
  position: fixed;
  color: #ff9acb;
  animation: naik 6s linear infinite;
}

@keyframes naik {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* SPARK */
.spark {
  position: fixed;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  animation: blink 2s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}
</style>
</head>

<body>

<div id="slides">

  <div class="slide">
    <h1>Hai kamu 💖</h1>
    <button onclick="next()">Mulai</button>
  </div>

  <div class="slide">
    <h1>Aku punya sesuatu...</h1>
    <button onclick="next()">Lanjut</button>
  </div>

  <div class="slide">
    <h1>Hari ini spesial banget ✨</h1>
    <button onclick="next()">Kenapa?</button>
  </div>

  <div class="slide">
    <h1>Karena ini hari ulang tahun...</h1>
    <div class="nama">AURA 💖</div>
    <button onclick="next()">Lanjut</button>
  </div>

  <div class="slide">
    <h1>🎉 Happy Birthday 🎂</h1>
    <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
    <p>Semoga kamu selalu bahagia 💖</p>
  </div>

</div>

<!-- MUSIC -->
<iframe id="music" width="0" height="0" src="" allow="autoplay"></iframe>

<script>
let index = 0;
let musicStarted = false;

function next() {
  index++;
  document.getElementById("slides").style.transform =
    "translateX(-" + (index * 100) + "vw)";

  if (!musicStarted) {
    document.getElementById("music").src =
      "https://www.youtube.com/embed/6Dh-RL__uN4?autoplay=1&loop=1&playlist=6Dh-RL__uN4";
    musicStarted = true;
  }

  hearts();
}

// HEART
function hearts(){
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random()*100+"vw";
  h.style.fontSize = (Math.random()*20+10)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),6000);
}

// SPARKLE
for (let i = 0; i < 60; i++) {
  let s = document.createElement("div");
  s.className = "spark";
  s.style.left = Math.random()*100+"vw";
  s.style.top = Math.random()*100+"vh";
  document.body.appendChild(s);
}
</script>

</body>
</html>
