<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to bottom, #1a001a, #000);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* START */
#start {
  position: fixed;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

button {
  padding: 15px 30px;
  font-size: 20px;
  border-radius: 30px;
  border: none;
  background: linear-gradient(45deg, #ff9acb, #ff4da6);
  color: white;
  cursor: pointer;
}

/* CONTENT */
#content {
  display: none;
  padding-top: 40px;
}

h1 {
  font-size: 42px;
  color: #ff9acb;
  text-shadow: 0 0 20px pink;
}

p {
  width: 85%;
  margin: auto;
  font-size: 18px;
  line-height: 1.6;
}

img {
  width: 260px;
  border-radius: 20px;
  margin-top: 20px;
}

/* HEART FLOAT */
.heart {
  position: fixed;
  font-size: 20px;
  animation: naik 6s linear infinite;
  color: #ff69b4;
}

@keyframes naik {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* SPARKLE */
.spark {
  position: fixed;
  width: 3px;
  height: 3px;
  background: pink;
  border-radius: 50%;
  animation: blink 2s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* GLOW BOX */
.box {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 20px;
  margin: 20px;
  box-shadow: 0 0 20px rgba(255,105,180,0.3);
}
</style>
</head>

<body>

<div id="start">
  <button onclick="mulai()">Klik ya 🎁</button>
</div>

<div id="content">

  <h1>Happy Birthday 💖</h1>

  <div class="box">
    <p id="text"></p>
  </div>

  <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">

  <!-- Musik YouTube -->
  <iframe width="0" height="0" 
  src="https://www.youtube.com/embed/6Dh-RL__uN4?autoplay=1&loop=1&playlist=6Dh-RL__uN4"
  frameborder="0" allow="autoplay"></iframe>

</div>

<script>
function mulai() {
  document.getElementById("start").style.display = "none";
  document.getElementById("content").style.display = "block";
  tulis();
  hearts();
  sparkle();
}

// TEXT
let pesan = "Selamat ulang tahun 💖 Untuk perempuan yang begitu indah, kuat, dan berharga. Semoga setiap langkahmu selalu dipenuhi kebahagiaan, dan semua impianmu perlahan menjadi nyata. Terima kasih sudah menjadi dirimu yang luar biasa ✨";

let i = 0;
function tulis() {
  if (i < pesan.length) {
    document.getElementById("text").innerHTML += pesan.charAt(i);
    i++;
    setTimeout(tulis, 35);
  }
}

// HEART
function hearts() {
  setInterval(() => {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (Math.random()*20+15)+"px";
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 6000);
  }, 300);
}

// SPARK
function sparkle() {
  for (let i = 0; i < 80; i++) {
    let s = document.createElement("div");
    s.className = "spark";
    s.style.left = Math.random()*100+"vw";
    s.style.top = Math.random()*100+"vh";
    document.body.appendChild(s);
  }
}
</script>

</body>
</html>
