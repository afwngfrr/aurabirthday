<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 💖</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  overflow: hidden;
  background: black;
  color: white;
}

/* CONTAINER */
#slides {
  display: flex;
  height: 100vh;
  transition: transform 0.7s ease;
}

/* SLIDE */
.slide {
  min-width: 100vw;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: linear-gradient(#1a001a, #000);
  text-align: center;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border-radius: 20px;
  border: none;
  background: hotpink;
  color: white;
  cursor: pointer;
}

/* TEXT */
h1 {
  font-size: 28px;
  padding: 0 20px;
}

/* NAMA */
.nama {
  font-size: 40px;
  color: pink;
  opacity: 0;
  transform: scale(0.5);
  animation: muncul 1.5s forwards;
}

@keyframes muncul {
  to {
    opacity: 1;
    transform: scale(1);
  }
}

/* GIF */
img {
  width: 200px;
  border-radius: 20px;
}

/* HEART */
.heart {
  position: fixed;
  color: pink;
  animation: naik 5s linear infinite;
}

@keyframes naik {
  from {transform: translateY(100vh);}
  to {transform: translateY(-10vh);}
}
</style>
</head>

<body>

<div id="slides">

  <div class="slide">
    <h1>Hai kamu 💖</h1>
    <button onclick="next()">Mulai</button>
  </div>

  <div class="slide">
    <h1>Aku punya sesuatu...</h1>
    <button onclick="next()">Lanjut</button>
  </div>

  <div class="slide">
    <h1>Hari ini spesial banget ✨</h1>
    <button onclick="next()">Kenapa?</button>
  </div>

  <div class="slide">
    <h1>Karena ini hari ulang tahun...</h1>
    <div class="nama">AURA 💖</div>
    <button onclick="next()">Lanjut</button>
  </div>

  <div class="slide">
    <h1>🎉 Happy Birthday 🎂</h1>
    <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
    <p>Semoga kamu selalu bahagia 💖</p>
  </div>

</div>

<!-- MUSIC -->
<iframe id="music" width="0" height="0" src="" allow="autoplay"></iframe>

<script>
let index = 0;
let musicStarted = false;

function next() {
  index++;
  document.getElementById("slides").style.transform =
    "translateX(-" + (index * 100) + "vw)";

  // MUSIC START
  if (!musicStarted) {
    document.getElementById("music").src =
      "https://www.youtube.com/embed/6Dh-RL__uN4?autoplay=1&loop=1&playlist=6Dh-RL__uN4";
    musicStarted = true;
  }

  hearts();
}

// HEART
function hearts(){
  let h = document.createElement("div");
  h.className = "heart";
  h.innerHTML = "💖";
  h.style.left = Math.random()*100+"vw";
  h.style.fontSize = (Math.random()*20+10)+"px";
  document.body.appendChild(h);

  setTimeout(()=>h.remove(),5000);
}
</script>

</body>
</html>
