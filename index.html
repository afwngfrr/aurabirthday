<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle, #0f0f0f, #000);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* START SCREEN */
#start {
  position: fixed;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

button {
  padding: 15px 30px;
  font-size: 20px;
  border-radius: 20px;
  border: none;
  background: linear-gradient(45deg, pink, hotpink);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:active {
  transform: scale(1.2);
}

/* CONTENT */
#content {
  display: none;
  padding-top: 50px;
}

h1 {
  font-size: 42px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px pink; }
  to { text-shadow: 0 0 30px hotpink; }
}

p {
  width: 80%;
  margin: auto;
  font-size: 18px;
}

img {
  width: 260px;
  border-radius: 20px;
  margin-top: 20px;
}

/* CONFETTI */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  top: -10px;
  animation: fall linear infinite;
}

@keyframes fall {
  to {
    transform: translateY(100vh) rotate(360deg);
  }
}

/* HEART */
.heart {
  position: fixed;
  color: pink;
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}

/* SPARKLE */
.sparkle {
  position: fixed;
  width: 3px;
  height: 3px;
  background: white;
  border-radius: 50%;
  animation: blink 1.5s infinite;
}

@keyframes blink {
  50% { opacity: 0; }
}

/* CANVAS BG */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="start">
  <button onclick="mulai()">Klik untuk buka 🎁</button>
</div>

<div id="content">
  <h1>🎉 Happy Birthday 🎂</h1>
  <p id="text"></p>
  <img src="https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif">
</div>

<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<script>
function mulai() {
  document.getElementById("start").style.display = "none";
  document.getElementById("content").style.display = "block";
  document.getElementById("music").play();
  tulisText();
  confetti();
  hearts();
  sparkle();
}

// TEXT EFFECT
let pesan = "Selamat ulang tahun 💖 Semoga hari-harimu selalu bahagia, penuh cinta, dan semua impianmu tercapai. Terima kasih sudah hadir dalam hidupku 🎁";

let i = 0;
function tulisText() {
  if (i < pesan.length) {
    document.getElementById("text").innerHTML += pesan.charAt(i);
    i++;
    setTimeout(tulisText, 40);
  }
}

// CONFETTI
function confetti() {
  for (let i = 0; i < 80; i++) {
    let d = document.createElement("div");
    d.className = "confetti";
    d.style.left = Math.random() * 100 + "vw";
    d.style.background = ["red","yellow","blue","pink"][Math.floor(Math.random()*4)];
    d.style.animationDuration = (Math.random()*3+2)+"s";
    document.body.appendChild(d);
  }
}

// HEARTS
function hearts() {
  setInterval(() => {
    let h = document.createElement("div");
    h.className = "heart";
    h.innerHTML = "💖";
    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (Math.random()*20+10)+"px";
    document.body.appendChild(h);

    setTimeout(() => h.remove(), 5000);
  }, 300);
}

// SPARKLES
function sparkle() {
  for (let i = 0; i < 100; i++) {
    let s = document.createElement("div");
    s.className = "sparkle";
    s.style.left = Math.random() * 100 + "vw";
    s.style.top = Math.random() * 100 + "vh";
    document.body.appendChild(s);
  }
}

// PARTICLE BACKGROUND
let canvas = document.getElementById("bg");
let ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let p = [];
for (let i = 0; i < 100; i++) {
  p.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    r: Math.random() * 2,
    d: Math.random() * 1
  });
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";
  p.forEach(pt=>{
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, pt.r, 0, Math.PI*2);
    ctx.fill();
  });
  update();
}

function update() {
  p.forEach(pt=>{
    pt.y += pt.d;
    if (pt.y > canvas.height) {
      pt.y = 0;
      pt.x = Math.random() * canvas.width;
    }
  });
}

setInterval(draw, 33);
</script>

</body>
</html>
